<!-- ══════════ EMPLOYEE DETAIL MODAL (View Only) ══════════ -->
<div id="empModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar">??</div>
      <div>
        <h2 id="modalName">Employee Name</h2>
        <span id="modalRole" class="modal-role">Role</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <span class="modal-label">Employee ID</span>
        <span id="modalId" class="modal-value">#001</span>
      </div>
      <div class="modal-field">
        <span class="modal-label">Email</span>
        <span id="modalEmail" class="modal-value">email@company.com</span>
      </div>
      <div class="modal-field">
        <span class="modal-label">Department</span>
        <span class="modal-value">Engineering</span>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal()" style="width:100%;">Close</button>
      </div>
    </div>
  </div>
</div>
